<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="coin-table.css" />
    <title>coingecko demo</title>
  </head>
  <body>
    <div class="main-container">
      <div class="nav-bar">
        <div class="left-top-nav">
          <img id="logo" src="Images/logo.png" />
          <h1>coingecko</h1>
        </div>
        <div id="counter"></div>
        <input id="search-coin" type="text" placeholder="Search..." />
      </div>
      <div class="heading">
        <h1>Top 10 Live Crypto Market</h1>
      </div>
      <div class="toggle">
        <h4>Please click the button to change the currency</h4>
        <button class="currency-button">EUR</button>
      </div>

      <div id="filter-coins">
        <div class="col rank">
          <span class="arrow-up">▴</span>
          <span># </span>
        </div>
        <div class="col"><span class="arrow-down">▾</span>Coin</div>
        <div class="col"><span class="arrow-down">▾</span>Price</div>
        <div class="col"><span class="arrow-down">▾</span>1h</div>
        <div class="col"><span class="arrow-down">▾</span>24h</div>
        <div class="col"><span class="arrow-down">▾</span>7d</div>
        <div class="col"><span class="arrow-down">▾</span>24h Volume</div>
        <div class="col"><span class="arrow-down">▾</span>Market Cap</div>
        <div class="col">Last 7 Days</div>
      </div>
      <div id="coin-lists"></div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
